name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.19.0", "22.13.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check:open-source
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: node --test scripts/*.test.mjs
      - run: bash -n scripts/*.sh
      - name: Test isolated database migration
        if: matrix.node-version == '22.13.0'
        run: scripts/test-legacy-migration-e2e.sh

  verify-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
      - name: Validate with Windows PowerShell 5.1
        shell: powershell
        env:
          CODEX_USAGE_DASHBOARD_DEVICE_TOKEN: public-ci-placeholder
        run: |
          $env:APPDATA = Join-Path $env:RUNNER_TEMP "codex-usage-dashboard-agent-test"
          .\scripts\install-agent-windows.ps1 `
            -ServerUrl "https://dashboard.example.test" `
            -DeviceName "CI" `
            -ValidateOnly
      - name: Run installer tests
        run: node --test scripts/install-agent.test.mjs
