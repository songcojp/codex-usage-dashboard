name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Open-source safety scan
        run: npm run check:open-source

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify deploy scripts
        run: |
          set -euo pipefail

          bash -n scripts/deploy.sh
          bash -n scripts/verify-local.sh
          grep -q 'docker compose' scripts/deploy.sh
          grep -q 'migrate.js' scripts/deploy.sh
          grep -q '/api/health' scripts/deploy.sh

      - name: Install SSH key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_KNOWN_HOSTS:?DEPLOY_KNOWN_HOSTS secret is required}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keygen -l -f ~/.ssh/known_hosts >/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RSYNC_RSH: ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is required}"

          case "$DEPLOY_PATH" in
            /opt/*|/srv/*) ;;
            *)
              echo "DEPLOY_PATH must be under /opt or /srv." >&2
              exit 1
              ;;
          esac

          scripts/deploy.sh "$DEPLOY_USER@$DEPLOY_HOST" "$DEPLOY_PATH"
